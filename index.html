<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidUz — Ko'ngil ochar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #ff4d6d;
    --accent2: #7c3aed;
    --accent3: #06b6d4;
    --text: #f0f0f5;
    --muted: #888899;
    --glow: rgba(255, 77, 109, 0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ...Qolgan CSS qismini o'zgartirmadik... */
</style>
</head>
<body>
<!-- ...html layout... -->
<!-- Pastda script -->
<script>
// NAMUNA VIDEOLAR MASSIVI
const videos = [
  {
    id: 1,
    title: "YouTube Namuna Video",
    cat: "Ko‘ngilochar",
    type: "youtube",
    url: "https://www.youtube.com/embed/dQw4w9WgXcQ",
    date: "2024-03-01",
    liked: false,
    likes: 7
  },
  {
    id: 2,
    title: "TikTok Namuna",
    cat: "Qiziqarli",
    type: "tiktok",
    url: "https://www.tiktok.com/@username/video/1234567890",
    date: "2024-02-15",
    liked: false,
    likes: 3
  },
  {
    id: 3,
    title: "Yuklangan Video",
    cat: "O‘rganish",
    type: "upload",
    url: "https://www.w3schools.com/html/mov_bbb.mp4",
    date: "2023-12-28",
    liked: false,
    likes: 4
  }
];

// Qolgan JS funksiyalari (o'zgartirmadik, sizda qanday bo'lsa shunday)

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('sectionTitle').textContent = cat === 'Barchasi' ? 'Barcha videolar' : cat;
  render();
}

function searchVideos() {
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = videos.filter(v =>
    (currentCat === 'Barchasi' || v.cat === currentCat) &&
    (v.title.toLowerCase().includes(q) || v.cat.toLowerCase().includes(q))
  );

  // Stats
  document.getElementById('totalCount').textContent = videos.length;
  document.getElementById('ytCount').textContent = videos.filter(v => v.type === 'youtube').length;
  document.getElementById('ttCount').textContent = videos.filter(v => v.type === 'tiktok').length;
  document.getElementById('upCount').textContent = videos.filter(v => v.type === 'upload').length;

  // Categories
  const cats = ['Barchasi', ...new Set(videos.map(v => v.cat))];
  document.getElementById('catContainer').innerHTML = cats.map(c => `
    <button class="cat-btn ${c === currentCat ? 'active' : ''}" data-cat="${c}" onclick="filterCat('${c}')">${c}</button>
  `).join('');

  // Grid
  const grid = document.getElementById('videoGrid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🎬</div>
      <h3>Hech narsa topilmadi</h3>
      <p>Video qo'shing yoki boshqa kategoriyani tanlang</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(v => {
    const badge = v.type === 'youtube' ? 'badge-youtube" >▶ YouTube'
                : v.type === 'tiktok'  ? 'badge-tiktok" >♪ TikTok'
                : 'badge-upload" >📁 Yuklangan';
    const thumb = v.type === 'youtube'
      ? `<img src="https://img.youtube.com/vi/${v.url.split('/embed/')[1]?.split('?')[0]}/hqdefault.jpg" style="width:100%;height:100%;object-fit:cover">`
      : v.type === 'upload'
      ? `<video src="${v.url}" style="width:100%;height:100%;object-fit:cover"></video>`
      : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1a24;font-size:2.5rem">♪</div>`;

    return `
    <div class="video-card">
      <div class="video-thumb" onclick="playVideo(${v.id})">
        ${thumb}
        <div class="play-overlay"><div class="play-icon">▶</div></div>
        <span class="source-badge ${badge}</span>
      </div>
      <div class="video-info">
        <div class="video-title">${v.title}</div>
        <div class="video-meta">
          <span class="video-cat">${v.cat}</span>
          <span>${new Date(v.date).toLocaleDateString('uz')}</span>
        </div>
      </div>
      <div class="video-actions">
        <button class="action-btn ${v.liked ? 'liked' : ''}" onclick="like(${v.id})">
          ${v.liked ? '❤️' : '🤍'} ${v.likes}
        </button>
        <button class="action-btn" onclick="playVideo(${v.id})">▶ Ko'rish</button>
        <button class="action-btn delete-btn" onclick="deleteVideo(${v.id})">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

// Close on backdrop click
// ... qolgani, sizda bo‘lgani kabi qoldiriladi ...
</script>
</body>
</html>
